services:
  fastapi-license-gateway:
    build: .
    container_name: fastapi-license-gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////app/data/licenses.db
      APP_BASE_URL: http://localhost:8000
    volumes:
      - gateway_data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

volumes:
  gateway_data:
