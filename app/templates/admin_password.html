<!doctype html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Passwort aendern</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(140deg, #eef5ff, #f7fff2);
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: #1a2433;
    }
    .card {
      width: min(520px, 92vw);
      background: #fff;
      border: 1px solid #e4ebf6;
      border-radius: 14px;
      padding: 22px;
      box-shadow: 0 8px 26px rgba(16, 33, 58, 0.08);
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .top a {
      text-decoration: none;
      background: #00509d;
      color: #fff;
      padding: 7px 11px;
      border-radius: 9px;
      font-weight: 700;
    }
    label { display: block; margin-top: 10px; font-size: 0.9rem; }
    input {
      width: 100%;
      margin-top: 6px;
      padding: 10px;
      border: 1px solid #ced8e5;
      border-radius: 10px;
      box-sizing: border-box;
    }
    button {
      margin-top: 14px;
      width: 100%;
      border: none;
      border-radius: 10px;
      background: #0a7f66;
      color: #fff;
      padding: 11px;
      font-weight: 700;
      cursor: pointer;
    }
    .error { color: #c1121f; min-height: 20px; margin-top: 8px; }
    .success { color: #0b6e4f; min-height: 20px; margin-top: 8px; }
    .lang-switch a { margin-right: 8px; color: #00509d; }
  </style>
</head>
<body>
  <form class="card" method="post" action="/admin/password">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
    <div class="top">
      <h1 style="margin: 0;">{{ t("change_password_title") }}</h1>
      <a href="/admin">{{ t("back") }}</a>
    </div>
    <p>{{ t("logged_in_as").format(username=admin.username, role=admin.role) }}</p>
    <p class="lang-switch">
      {% for l in supported_languages %}
        <a href="/admin/password?lang={{ l }}">{{ l.upper() }}</a>
      {% endfor %}
    </p>

    <label for="current_password">{{ t("current_password") }}</label>
    <input id="current_password" name="current_password" type="password" required />

    <label for="new_password">{{ t("new_password") }}</label>
    <input id="new_password" name="new_password" type="password" required />

    <label for="confirm_password">{{ t("confirm_password") }}</label>
    <input id="confirm_password" name="confirm_password" type="password" required />

    <button type="submit">{{ t("save_password") }}</button>
    <p class="error">{{ error }}</p>
    <p class="success">{{ success }}</p>
  </form>
</body>
</html>
